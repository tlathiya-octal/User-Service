spring:
  datasource:
    url: jdbc:h2:mem:usersvc;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: simple

eureka:
  client:
    enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
